<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - OTT Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-bg text-white">
    <nav class="navbar navbar-dark bg-transparent">
        <div class="container">
            <a class="navbar-brand fw-bold fs-2" href="/">OTT PLATFORM</a>
        </div>
    </nav>

    <div class="container py-5 mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="glass-card p-5 shadow-lg">
                    <h2 class="fw-bold mb-4">Sign In</h2>
                    <form id="loginForm">
                        <div class="mb-4">
                            <label class="form-label small text-muted text-uppercase fw-bold">Email</label>
                            <input type="email" name="Email" class="form-control bg-dark text-white border-secondary py-2" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small text-muted text-uppercase fw-bold">Password</label>
                            <input type="password" name="Password" class="form-control bg-dark text-white border-secondary py-2" required>
                        </div>
                        <button type="submit" class="btn btn-netflix w-100 py-3 fw-bold fs-5 mt-3">Sign In</button>
                    </form>
                    <div class="mt-4 text-center">
                        <p class="text-muted">New to OTT? <a href="/register" class="text-white text-decoration-none fw-bold">Join now.</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if (res.ok) {
                const result = await res.json();
                localStorage.setItem('token', result.token);
                localStorage.setItem('user_id', result.user_id);
                localStorage.setItem('first_name', result.first_name);
                window.location.href = '/';
            } else {
                alert('Invalid email or password!');
            }
        });
    </script>
</body>
</html>
