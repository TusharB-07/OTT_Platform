<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - OTT Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-dark text-white">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 card bg-secondary text-white p-4">
                <h2 class="text-center mb-4">Create Account</h2>
                <form id="registerForm">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" id="email-field" name="Email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="Password" class="form-control" required>
                    </div>
                    <div class="row">
                        <div class="col mb-3">
                            <label class="form-label">First Name</label>
                            <input type="text" name="FirstName" class="form-control" required>
                        </div>
                        <div class="col mb-3">
                            <label class="form-label">Last Name</label>
                            <input type="text" name="LastName" class="form-control" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Date of Birth</label>
                        <input type="date" name="DOB" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-danger w-100">Register</button>
                </form>
                <p class="mt-3 text-center">Already have an account? <a href="/login" class="text-white">Login here</a></p>
            </div>
        </div>
    </div>
    <script>
        // Pre-fill email from URL
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        if (email) {
            document.getElementById('email-field').value = email;
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if (res.ok) {
                alert('Success! Redirecting to login.');
                window.location.href = '/login';
            } else {
                alert('Registration failed!');
            }
        });
    </script>
</body>
</html>
