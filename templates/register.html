<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join OTT Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-bg text-white">
    <nav class="navbar navbar-dark bg-transparent">
        <div class="container">
            <a class="navbar-brand fw-bold fs-2" href="/">OTT PLATFORM</a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-6">
                <div class="glass-card p-5 shadow-lg">
                    <h2 class="fw-bold mb-4">Create Account</h2>
                    <form id="registerForm">
                        <div class="mb-4">
                            <label class="form-label small text-muted text-uppercase fw-bold">Email Address</label>
                            <input type="email" id="email-field" name="Email" class="form-control bg-dark text-white border-secondary py-2" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small text-muted text-uppercase fw-bold">Password</label>
                            <input type="password" name="Password" class="form-control bg-dark text-white border-secondary py-2" required>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-6 mb-4">
                                <label class="form-label small text-muted text-uppercase fw-bold">First Name</label>
                                <input type="text" name="FirstName" class="form-control bg-dark text-white border-secondary py-2" required>
                            </div>
                            <div class="col-md-6 mb-4">
                                <label class="form-label small text-muted text-uppercase fw-bold">Last Name</label>
                                <input type="text" name="LastName" class="form-control bg-dark text-white border-secondary py-2" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small text-muted text-uppercase fw-bold">Date of Birth</label>
                            <input type="date" name="DOB" class="form-control bg-dark text-white border-secondary py-2" required>
                        </div>
                        <button type="submit" class="btn btn-netflix w-100 py-3 fw-bold fs-5 mt-3">Start Membership</button>
                    </form>
                    <div class="mt-4 text-center">
                        <p class="text-muted">Already have an account? <a href="/login" class="text-white text-decoration-none fw-bold">Sign In.</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        if (email) {
            document.getElementById('email-field').value = email;
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if (res.ok) {
                alert('Account created! Welcome to the family.');
                window.location.href = '/login';
            } else {
                alert('Registration failed. Please try again.');
            }
        });
    </script>
</body>
</html>
