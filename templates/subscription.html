<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Plans - OTT Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-dark text-white">
    <nav class="navbar navbar-expand-lg navbar-dark bg-black shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-danger" href="/">OTT PLATFORM</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="/">Browse</a></li>
                    <li class="nav-item"><a class="nav-link" href="/subscription">Subscription</a></li>
                    <li id="auth-links" class="d-flex align-items-center">
                        <li class="nav-item"><a class="nav-link" href="/login">Login</a></li>
                        <li class="nav-item"><a class="nav-link btn btn-danger btn-sm ms-lg-3 px-3" href="/register">Register</a></li>
                    </li>
                    <li id="user-links" class="d-flex align-items-center" style="display:none !important;">
                        <li class="nav-item"><span class="nav-link text-light me-2 small fw-bold" id="user-display"></span></li>
                        <li class="nav-item"><button class="btn btn-outline-light btn-sm ms-lg-2" onclick="logout()">Logout</button></li>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h2 class="text-center mb-5 fw-bold">Choose Your Plan</h2>
        <div id="plans-grid" class="row row-cols-1 row-cols-md-3 g-4">
            <!-- Plans will be loaded here -->
        </div>
    </div>

    <script>
        function checkAuth() {
            const token = localStorage.getItem('token');
            const firstName = localStorage.getItem('first_name');
            const authLinks = document.getElementById('auth-links');
            const userLinks = document.getElementById('user-links');
            
            if (token) {
                if(authLinks) authLinks.style.setProperty('display', 'none', 'important');
                if(userLinks) {
                    userLinks.style.setProperty('display', 'flex', 'important');
                    document.getElementById('user-display').textContent = `Hi, ${firstName || 'User'}!`;
                }
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('first_name');
            localStorage.removeItem('user_id');
            window.location.href = '/';
        }

        async function loadPlans() {
            checkAuth();
            const res = await fetch('/api/plans');
            const plans = await res.json();
            const grid = document.getElementById('plans-grid');
            
            grid.innerHTML = plans.map(p => `
                <div class="col">
                    <div class="card bg-secondary text-white h-100 shadow border-0">
                        <div class="card-header bg-danger text-center py-3">
                            <h3 class="my-0 fw-bold">${p.Name}</h3>
                        </div>
                        <div class="card-body text-center d-flex flex-column">
                            <h1 class="card-title pricing-card-title mt-3">₹${p.Price}<small class="text-light opacity-75 fw-light">/mo</small></h1>
                            <ul class="list-unstyled mt-3 mb-4 fs-5">
                                <li>${p.Screens} screens at a time</li>
                                <li>HD Available</li>
                                <li>Unlimited Content</li>
                            </ul>
                            <button onclick="subscribe(${p.PlanID}, ${p.Price})" class="btn btn-lg btn-danger mt-auto fw-bold">Subscribe Now</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function subscribe(planId, price) {
            const token = localStorage.getItem('token');
            if (!token) {
                alert('Please login to subscribe!');
                window.location.href = '/login';
                return;
            }

            const res = await fetch('/api/subscriptions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': token
                },
                body: JSON.stringify({
                    PlanID: planId,
                    Amount: price,
                    Method: 'Card' 
                })
            });

            if (res.ok) {
                alert('Subscription successful! Enjoy your content.');
                window.location.href = '/';
            } else {
                alert('Subscription failed. Please try again.');
            }
        }

        loadPlans();
    </script>
</body>
</html>
